<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">Heads coin face</title>
  <desc id="desc">A silver medallion with a classical right-facing portrait and laurel leaves.</desc>
  <defs>
