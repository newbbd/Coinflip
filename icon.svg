<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Secure Coin Flip icon</title>
  <desc id="desc">A gold coin with the letter H on a dark background</desc>
  <defs>
    <radialGradient id="bg" cx="20%" cy="10%" r="100%">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#070b14"/>
    </radialGradient>
    <radialGradient id="coin" cx="32%" cy="25%" r="75%">
      <stop offset="0" stop-color="#fff1a1"/>
      <stop offset="0.22" stop-color="#fcd34d"/>
      <stop offset="0.7" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b96603"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="166" fill="url(#coin)" stroke="#7c4500" stroke-width="18"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="#8d5200" stroke-width="6" stroke-dasharray="12 12" opacity="0.68"/>
  <text x="256" y="326" text-anchor="middle" font-family="Georgia, serif" font-size="210" font-weight="700" fill="#573100">H</text>
</svg>
